<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moving Computer — puzzle platformer</title>
    <link rel="stylesheet" href="src/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.170.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud">
      <div id="score">Find the exit</div>
      <div id="hint">
        ← → or A D · Space / W / ↑ jump · Reach the green Wi‑Fi door · Stand by the
        router to open the wall
      </div>
    </div>
    <div id="win" hidden>
      <p id="win-title">Online!</p>
      <p id="win-sub">Your moving computer made it to the network.</p>
      <button type="button" id="play-again">Play again</button>
    </div>
    <div id="gameover" hidden>
      <p>Recalibrating…</p>
      <p id="final-score">You fell off the desk.</p>
      <button type="button" id="restart">Respawn</button>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
