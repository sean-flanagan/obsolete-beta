<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBSOLETE</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="title-screen">
      <h1 id="game-title">OBSOLETE</h1>
      <p class="title-sub">A moving‑computer puzzle platformer</p>
      <button type="button" id="title-play">Play</button>
      <p class="title-hint">Enter or Space</p>
    </div>
    <div id="hud">
      <div id="score">Find the exit</div>
      <div id="hint">
        ← → or A D · Space / W / ↑ jump · M mute · Reach the green Wi‑Fi door · Stand by
        the router to open the wall
      </div>
    </div>
    <div id="win" hidden>
      <p id="win-title">Online!</p>
      <p id="win-sub">Your moving computer made it to the network.</p>
      <button type="button" id="play-again">Play again</button>
    </div>
    <div id="gameover" hidden>
      <p>Recalibrating…</p>
      <p id="final-score">You fell off the desk.</p>
      <button type="button" id="restart">Respawn</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
